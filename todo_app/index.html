<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدير المهام الشخصي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container"> 
        <!-- رأس التطبيق -->
        <header>
            <h1>📝 مدير المهام الشخصي</h1>
            <p>نظم مهامك اليومية بكل سهولة</p>
        </header>

        <!-- القسم الرئيسي -->
        <main>
            <!-- قسم إضافة مهمة جديدة -->
            <section class="add-task-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="taskInput" 
                        placeholder="أضف مهمة جديدة..." 
                        class="task-input"
                    >
                    <button id="addBtn" class="add-btn">إضافة</button>
                </div>
            </section>

            <!-- قسم الفلترة -->
            <section class="filter-section">
                <button class="filter-btn active" data-filter="all">الكل</button>
                <button class="filter-btn" data-filter="pending">قيد الإنجاز</button>
                <button class="filter-btn" data-filter="completed">مكتملة</button>
            </section>

            <!-- قائمة المهام -->
            <section class="tasks-section">
                <ul id="taskList" class="task-list">
                    <!-- المهام سيتم إضافتها هنا بواسطة JavaScript -->
                </ul>
                <p id="emptyMessage" class="empty-message">لا توجد مهام حالياً</p>
            </section>

            <!-- إحصائيات -->
            <section class="stats-section">
                <div class="stat">
                    <span class="stat-label">إجمالي المهام:</span>
                    <span id="totalTasks" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">المكتملة:</span>
                    <span id="completedTasks" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">قيد الإنجاز:</span>
                    <span id="pendingTasks" class="stat-value">0</span>
                </div>
            </section>

            <!-- زر حذف جميع المهام -->
            <section class="actions-section">
                <button id="clearBtn" class="clear-btn">حذف جميع المهام</button>
            </section>
        </main>

        <!-- تذييل التطبيق -->
        <footer>
            <p>تم التطوير بواسطة <strong>MisferAlharthy</strong></p>
            <p>&copy; 2026 جميع الحقوق محفوظة</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
