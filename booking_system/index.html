<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحجوزات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- رأس الصفحة -->
        <header>
            <h1>نظام الحجوزات</h1>
            <p>احجز موعدك بكل سهولة</p>
        </header>

        <!-- نموذج الحجز -->
        <main>
            <section class="booking-section">
                <h2>نموذج الحجز</h2>
                
                <form id="bookingForm">
                    <div class="form-group">
                        <label for="name">الاسم الكامل:</label>
                        <input type="text" id="name" name="name" placeholder="أدخل اسمك" required>
                    </div>

                    <div class="form-group">
                        <label for="email">البريد الإلكتروني:</label>
                        <input type="email" id="email" name="email" placeholder="example@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">رقم الهاتف:</label>
                        <input type="tel" id="phone" name="phone" placeholder="05xxxxxxxx" required>
                    </div>

                    <div class="form-group">
                        <label for="date">تاريخ الموعد:</label>
                        <input type="date" id="date" name="date" required>
                    </div>

                    <div class="form-group">
                        <label for="service">نوع الخدمة:</label>
                        <select id="service" name="service" required>
                            <option value="">اختر الخدمة</option>
                            <option value="استشارة">استشارة</option>
                            <option value="صيانة">صيانة</option>
                            <option value="تدريب">تدريب</option>
                            <option value="أخرى">أخرى</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">ملاحظات إضافية:</label>
                        <textarea id="message" name="message" rows="4" placeholder="أضف أي ملاحظات تود إخبارنا بها"></textarea>
                    </div>

                    <button type="submit" class="btn-submit">تأكيد الحجز</button>
                </form>

                <div id="successMessage" class="message success-message" style="display: none;">
                    <h3>تم الحجز بنجاح!</h3>
                    <p>شكراً لك، سيتم التواصل معك قريباً.</p>
                    <p id="bookingDetails"></p>
                </div>

                <div id="errorMessage" class="message error-message" style="display: none;">
                    <p id="errorText"></p>
                </div>
            </section>
        </main>

        <!-- تذييل الصفحة -->
        <footer>
            <p>تم التطوير بواسطة <strong>MisferAlharthy</strong></p>
            <p>&copy; 2026 جميع الحقوق محفوظة</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
